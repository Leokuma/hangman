services:
  api:
    build: .
    image: hangman
    container_name: api
    command: ["deno", "run", "--allow-read", "--allow-env", "--allow-net", "main.js"]
    ports:
      - "80:80"
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/hangman
    env_file: '.env'
  mongo:
    image: mongo:4.4.3-bionic
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongo:/data/db
  redis:
    image: redis:alpine3.12
    container_name: redis
    ports:
      - "6379:6379"
    depends_on:
      - mongo
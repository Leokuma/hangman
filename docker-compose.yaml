services:
  api:
    build: .
    image: hangman
    container_name: api
    command: ["deno", "run", "--allow-read", "--allow-env", "--allow-net", "main.js"]
    ports:
      - "80:80"
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/hangman
    environment:
      BASE_URL: http://localhost/
      PORT: 80
      MONGO_URL: mongodb://mongo:27017
      REDIS_HOSTNAME: redis
      REDIS_PORT: 6379
  mongo:
    image: mongo:4.4.3-bionic
    container_name: mongo
    volumes:
      - ./mongo:/data/db
  redis:
    image: redis:alpine3.12
    container_name: redis
    depends_on:
      - mongo